name: House Price Predictor CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Linters (Black)
      run: |
        black --check .

    - name: Run Linters (Isort)
      run: |
        isort --check-only .

    - name: Run Linters (Flake8)
      run: |
        flake8 .

    - name: Run Pytest Suite with Coverage
      run: |
        pytest --cov=src --cov=server --cov-report=xml

    - name: Build Docker Image
      run: |
        docker build -t house-price-api .

    - name: Run Docker Container & Smoke Test
      run: |
        docker run -d -p 8000:8000 --name house-price-container house-price-api
        
        echo "Waiting for service to boot..."
        for i in {1..15}; do
          if curl -s http://localhost:8000/health | grep -q "healthy"; then
            echo "Service is healthy!"
            break
          fi
          sleep 1
        done
        
        echo "Checking /health endpoint..."
        curl -f -s http://localhost:8000/health
        
        echo "Checking /predict endpoint..."
        curl -f -s -X POST http://localhost:8000/predict \
          -H "Content-Type: application/json" \
          -d '{"location": "Hebbal", "sqft": 1500, "bhk": 3, "bath": 3}'
        
        docker stop house-price-container
        docker rm house-price-container

