version: '3.8'

services:
  house-price-predictor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: house-price-predictor-container
    ports:
      - "8000:8000"
    restart: always
    environment:
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
